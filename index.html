<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Загонка MSX</title>
</head>
<body>
    <script>
        const server = "http://zagonka12.zagonkom.gb.net/y";
        
        const MSX = {
            "name": "Загонка",
            "version": "1.0",
            "menu": [
                {"type": "link", "title": "🎬 Фильмы", "url": server + "/films"},
                {"type": "link", "title": "📺 Сериалы", "url": server + "/series"},
                {"type": "link", "title": "⭐ Новинки", "url": server + "/new"},
                {"type": "link", "title": "🔍 Поиск", "url": server + "/search"}
            ]
        };

        if (location.search.includes('msx')) {
            document.body.innerText = JSON.stringify(MSX);
        } else {
            document.body.innerHTML = '<h1>Загонка MSX</h1><p>URL для MSX:<br><b>' + location.origin + location.pathname + '?msx=1</b></p>';
        }
    </script>
</body>
</html>
